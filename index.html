<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Ultra Simple</title>
</head>
<body>
  <h1>🔔 Test</h1>
  <button id="btn">Activar y Probar</button>
  <p id="estado">Pulsa el botón</p>

  <script>
    const btn = document.getElementById('btn');
    const estado = document.getElementById('estado');

    btn.onclick = async () => {
      estado.innerHTML = 'Solicitando permiso...';
      
      const permiso = await Notification.requestPermission();
      
      if (permiso === 'granted') {
        estado.innerHTML = '✅ Permiso concedido. Enviando notificación...';
        new Notification('¡Funciona! 📱', {
          body: 'Esta es tu notificación de prueba.'
        });
      } else {
        estado.innerHTML = '❌ Permiso denegado';
      }
    };
  </script>
</body>
</html>
